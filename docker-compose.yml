version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: vendor_portal_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vendor_invoicing_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: vendor_portal_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data: